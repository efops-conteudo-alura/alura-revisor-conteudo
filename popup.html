<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: system-ui, Arial; width: 320px; padding: 12px; }
      button { width: 100%; padding: 10px; cursor: pointer; }
      .status { margin-top: 10px; font-size: 12px; white-space: pre-wrap; }
      .hint { margin-top: 8px; color: #666; font-size: 12px; }
      #history { margin-top: 14px; }
      .hist-title { font-weight: 700; font-size: 12px; color: #333; margin-bottom: 4px; }
      .hist-item { font-size: 11px; padding: 5px 0; border-bottom: 1px solid #eee; color: #444; }
      .hist-item:last-child { border-bottom: none; }
      .hist-id { font-weight: 700; }
      .hist-ok { color: #2e7d32; font-weight: 600; }
      .hist-report { background: none; border: none; color: #1565c0; text-decoration: underline; cursor: pointer; padding: 0; font-size: 11px; width: auto; }
    </style>
  </head>
  <body>
    <button id="start">Start revisão</button>
    <div class="hint">Abra a Home do curso e clique Start.</div>
    <div id="status" class="status"></div>
    <div id="history"></div>
    <script src="popup.js"></script>
  </body>
</html>
